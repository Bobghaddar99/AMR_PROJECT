slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Frames / topics
    odom_frame: odom
    map_frame: map
    base_frame: vehicle_blue/chassis
    scan_topic: /scan

    # Core mode
    mode: mapping
    use_map_saver: true
    debug_logging: false

    # Async toolbox behavior
    # In async mode this should stay 1 to avoid stale scans.
    scan_queue_size: 1
    throttle_scans: 1

    # TF / timing
    transform_publish_period: 0.02
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    restamp_tf: false

    # Map rasterization
    resolution: 0.05
    map_update_interval: 2.0
    min_laser_range: 0.1
    max_laser_range: 10.0

    # Scan matcher / graph updates
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    scan_buffer_maximum_scan_distance: 10.0
    scan_buffer_size: 30

    # Loop closure
    do_loop_closing: true
    loop_search_maximum_distance: 4.0
