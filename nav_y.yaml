amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "vehicle_blue/chassis"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"

    min_particles: 500
    max_particles: 2000
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    laser_model_type: "likelihood_field"
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    transform_tolerance: 1.0

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: "/home/adammanasfi/AMR_PROJECT/adam_map/adam_map.yaml"

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: vehicle_blue/chassis
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /odom
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.05
    failure_tolerance: 0.3

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28
      stateful: false

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true

      min_vel_x: -0.4
      max_vel_x: 0.4
      max_vel_theta: 0.7

      min_speed_xy: 0.0
      max_speed_xy: 0.4
      min_speed_theta: 0.08

      acc_lim_x: 1.0
      acc_lim_theta: 1.0
      decel_lim_x: -1.0
      decel_lim_theta: -1.0

      vx_samples: 20
      vtheta_samples: 20
      sim_time: 1.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3

      trans_stopped_velocity: 0.05

      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        - Oscillation
        - BaseObstacle
        - PathDist
        - GoalDist

      RotateToGoal.scale: 2.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      PathAlign.scale: 16.0
      GoalAlign.scale: 8.0
      PathDist.scale: 24.0
      GoalDist.scale: 12.0
      BaseObstacle.scale: 0.02

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: vehicle_blue/chassis
      update_frequency: 1.0
      publish_frequency: 1.0
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05

      # robot_radius: 1.3
      footprint: "[[1.15, 1.15], [1.15, -1.15], [-1.15, -1.15], [-1.15, 1.15]]"


      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 6.0
        inflation_radius: 1.6

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: vehicle_blue/chassis
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true

      # robot_radius: 1.3
      footprint: "[[1.15, 1.15], [1.15, -1.15], [-1.15, -1.15], [-1.15, 1.15]]"

      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 2.0
          raytrace_min_range: 0.0
          obstacle_max_range: 1.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 1.6

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: vehicle_blue/chassis
    cycle_frequency: 10.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
